name: Actualizar listas DIAN

on:
  schedule:
    # Lunes y jueves 6:00 a.m. hora Colombia (UTC-5) => 11:00 UTC
    - cron: "0 11 * * 1,4"
  workflow_dispatch: {}

permissions:
  contents: write   # commit/push de los archivos generados
  actions: write    # re-habilitar el propio workflow (keep-alive del cron)

concurrency:
  group: actualizar-dian
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cachear navegador de Playwright (Chromium)
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Instalar dependencias del sistema para Chromium
        run: python -m playwright install-deps chromium

      - name: Instalar Chromium (omite la descarga si está en caché)
        run: python -m playwright install chromium

      # continue-on-error: si UNA fuente falla, el run continúa para commitear las
      # fuentes que SÍ se actualizaron. El paso final re-propaga el fallo.
      - name: Ejecutar scraper
        id: scraper
        continue-on-error: true
        run: python scraper.py

      - name: Commit y push si hubo cambios
        run: |
          git config user.name  "cantejuandavid"
          git config user.email "cantejuandavid@users.noreply.github.com"
          git add proveedores_ficticios.csv proveedores_ficticios.json meta.json \
                  contadores_sancionados.csv contadores_sancionados.json contadores_sancionados.meta.json \
                  autorretenedores_renta.csv autorretenedores_renta.json autorretenedores_renta.meta.json
          if git diff --staged --quiet; then
            echo "Sin cambios: nada que commitear."
          else
            archivos=$(git diff --staged --name-only | tr '\n' ' ')
            git commit -m "Actualizar listas DIAN ($(date -u +'%Y-%m-%d %H:%M UTC'))" \
                       -m "Archivos: ${archivos}"
            git pull --rebase origin main
            git push
          fi

      # GitHub desactiva los workflows con `schedule` tras ~60 días sin actividad en el
      # repo. Como solo commiteamos cuando la DIAN cambia algo, puede no haber actividad
      # por meses; este paso re-habilita el workflow en cada corrida para resetear ese
      # contador y que el cron nunca muera en silencio.
      - name: Mantener activo el cron (keep-alive)
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method PUT \
            "repos/${{ github.repository }}/actions/workflows/actualizar.yml/enable" \
            && echo "Workflow re-habilitado (keep-alive OK)." \
            || echo "Keep-alive falló (no crítico)."

      - name: Propagar fallo del scraper
        if: steps.scraper.outcome == 'failure'
        run: |
          echo "::error::El scraper terminó con error en al menos una fuente (las demás sí se commitearon)."
          exit 1
